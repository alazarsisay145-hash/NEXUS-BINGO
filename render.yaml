services:
  - type: web
    name: nexus-bingo
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -c gunicorn_config.py app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: BOT_TOKEN
        sync: false  # Set this in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Auto-generate if not set
      - key: ADMIN_ID
        sync: false  # Set your Telegram ID
      - key: WEBAPP_URL
        value: https://nexus-bingo.onrender.com
      - key: WEBHOOK_URL
        value: https://nexus-bingo.onrender.com/webhook
      - key: DATABASE_URL
        value: sqlite:///bingo.db  # Or use Render PostgreSQL
