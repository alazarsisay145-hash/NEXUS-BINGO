<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multi Timezone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .timezone-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .timezone-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .timezone-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .timezone-btn.active {
            background: rgba(255, 255, 255, 0.8);
            color: #667eea;
            border-color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .clock-card.hidden {
            display: none;
        }

        .clock-card.active {
            border: 3px solid #667eea;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .timezone-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .timezone-label .zone-info {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            font-weight: 600;
            color: #667eea;
        }

        .digital-time {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .time-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.75em;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 1.1em;
            color: #333;
            font-weight: 700;
        }

        .date-display {
            font-size: 0.95em;
            color: #666;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid #667eea;
            position: relative;
            margin: 20px auto;
            background: white;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #667eea;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 40px;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 50px;
            margin-left: -2px;
            background: #764ba2;
        }

        .second-hand {
            width: 2px;
            height: 55px;
            margin-left: -1px;
            background: #ff6b6b;
        }

        .stats-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .stats-title {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .add-timezone {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-timezone input,
        .add-timezone button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
        }

        .add-timezone input {
            flex: 1;
            min-width: 200px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .add-timezone input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-timezone button {
            background: rgba(255, 255, 255, 0.8);
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .add-timezone button:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .toggle-analog {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .toggle-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.8);
            color: #667eea;
            border-color: white;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .digital-time {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .timezone-selector {
                flex-direction: column;
            }

            .timezone-btn {
                width: 100%;
            }
        }

        .no-clocks {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ WORLD CLOCK</h1>
            <p>Track time across multiple time zones in real-time</p>
        </div>

        <div class="toggle-analog">
            <button class="toggle-btn active" onclick="toggleView('digital')">🔢 Digital</button>
            <button class="toggle-btn" onclick="toggleView('analog')">🕐 Analog</button>
        </div>

        <div class="add-timezone">
            <input type="text" id="timezoneInput" placeholder="Add timezone (e.g., America/New_York, Asia/Tokyo, Europe/London)...">
            <button onclick="addTimezone()">➕ Add</button>
        </div>

        <div class="timezone-selector" id="presetTimezones">
            <!-- Will be populated by JavaScript -->
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Will be populated by JavaScript -->
        </div>

        <div id="noClocks" class="no-clocks" style="display: none;">
            Select or add timezones to see clocks
        </div>

        <div class="stats-section">
            <div class="stats-title">📊 Global Time Statistics</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Active Clocks</div>
                    <div class="stat-value" id="statClocks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">UTC Offset Range</div>
                    <div class="stat-value" id="statRange">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Earliest Time</div>
                    <div class="stat-value" id="statEarliest">--:--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Latest Time</div>
                    <div class="stat-value" id="statLatest">--:--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default timezones to display
        const DEFAULT_TIMEZONES = [
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo',
            'Australia/Sydney',
            'Asia/Dubai',
            'America/Los_Angeles'
        ];

        // All available timezones
        const TIMEZONE_PRESETS = [
            'America/New_York',
            'America/Chicago',
            'America/Denver',
            'America/Los_Angeles',
            'America/Anchorage',
            'Pacific/Honolulu',
            'Europe/London',
            'Europe/Paris',
            'Europe/Berlin',
            'Europe/Moscow',
            'Africa/Cairo',
            'Asia/Dubai',
            'Asia/Kolkata',
            'Asia/Bangkok',
            'Asia/Singapore',
            'Asia/Hong_Kong',
            'Asia/Tokyo',
            'Australia/Sydney',
            'Australia/Melbourne',
            'Pacific/Auckland'
        ];

        let selectedTimezones = [...DEFAULT_TIMEZONES];
        let displayMode = 'digital';
        let showAnalog = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPresetButtons();
            updateClocks();
            setInterval(updateClocks, 1000);
        });

        function renderPresetButtons() {
            const container = document.getElementById('presetTimezones');
            container.innerHTML = '';

            TIMEZONE_PRESETS.forEach(tz => {
                const btn = document.createElement('button');
                btn.className = `timezone-btn ${selectedTimezones.includes(tz) ? 'active' : ''}`;
                btn.textContent = getTzShortName(tz);
                btn.title = tz;
                btn.onclick = () => toggleTimezone(tz);
                container.appendChild(btn);
            });
        }

        function toggleTimezone(tz) {
            if (selectedTimezones.includes(tz)) {
                selectedTimezones = selectedTimezones.filter(t => t !== tz);
            } else {
                selectedTimezones.push(tz);
            }
            selectedTimezones.sort();
            renderPresetButtons();
            updateClocks();
        }

        function addTimezone() {
            const input = document.getElementById('timezoneInput');
            const tz = input.value.trim();

            if (!tz) {
                alert('Please enter a timezone');
                return;
            }

            if (selectedTimezones.includes(tz)) {
                alert('Timezone already added');
                return;
            }

            // Validate timezone
            try {
                new Date().toLocaleString('en-US', { timeZone: tz });
            } catch (e) {
                alert('Invalid timezone: ' + tz);
                return;
            }

            selectedTimezones.push(tz);
            selectedTimezones.sort();
            input.value = '';
            renderPresetButtons();
            updateClocks();
        }

        function getTzShortName(tz) {
            const parts = tz.split('/');
            return parts[parts.length - 1].replace(/_/g, ' ');
        }

        function toggleView(mode) {
            displayMode = mode;
            showAnalog = mode === 'analog';

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            updateClocks();
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            const noClocks = document.getElementById('noClocks');

            if (selectedTimezones.length === 0) {
                grid.innerHTML = '';
                noClocks.style.display = 'block';
                updateStats();
                return;
            }

            noClocks.style.display = 'none';
            grid.innerHTML = selectedTimezones.map(tz => createClockCard(tz)).join('');

            // Update analog clock hands if needed
            if (showAnalog) {
                updateAnalogClocks();
            }

            updateStats();
        }

        function createClockCard(tz) {
            const now = new Date();
            const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));

            const hours = String(tzTime.getHours()).padStart(2, '0');
            const minutes = String(tzTime.getMinutes()).padStart(2, '0');
            const seconds = String(tzTime.getSeconds()).padStart(2, '0');

            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

            const day = dayNames[tzTime.getDay()];
            const date = tzTime.getDate();
            const month = monthNames[tzTime.getMonth()];
            const year = tzTime.getFullYear();

            // Get offset
            const offset = getTimezoneOffset(tz);

            let analogClock = '';
            if (showAnalog) {
                analogClock = `
                    <div class="analog-clock" id="clock-${tz}">
                        <div class="clock-center"></div>
                        <div class="hand hour-hand" id="hour-${tz}" style="transform: rotate(${(tzTime.getHours() % 12) * 30 + tzTime.getMinutes() * 0.5}deg);"></div>
                        <div class="hand minute-hand" id="minute-${tz}" style="transform: rotate(${tzTime.getMinutes() * 6 + tzTime.getSeconds() * 0.1}deg);"></div>
                        <div class="hand second-hand" id="second-${tz}" style="transform: rotate(${tzTime.getSeconds() * 6}deg);"></div>
                    </div>
                `;
            }

            return `
                <div class="clock-card" id="card-${tz}">
                    <div class="timezone-name">${getTzShortName(tz)}</div>
                    <div class="timezone-label">
                        ${tz}
                        <span class="zone-info">UTC ${offset}</span>
                    </div>
                    
                    ${analogClock}
                    
                    <div class="digital-time">${hours}:${minutes}:${seconds}</div>
                    
                    <div class="time-details">
                        <div class="detail-item">
                            <div class="detail-label">Hour</div>
                            <div class="detail-value">${hours}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Minute</div>
                            <div class="detail-value">${minutes}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Second</div>
                            <div class="detail-value">${seconds}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">AM/PM</div>
                            <div class="detail-value">${tzTime.getHours() >= 12 ? 'PM' : 'AM'}</div>
                        </div>
                    </div>
                    
                    <div class="date-display">
                        <strong>${day}, ${date} ${month} ${year}</strong>
                    </div>
                    
                    <button class="remove-btn" onclick="removeTimezone('${tz}')">✕ Remove</button>
                </div>
            `;
        }

        function getTimezoneOffset(tz) {
            const now = new Date();
            const utcTime = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));

            const diff = (tzTime - utcTime) / (1000 * 60 * 60);
            const sign = diff >= 0 ? '+' : '-';
            const hours = Math.floor(Math.abs(diff));
            const minutes = Math.round((Math.abs(diff) - hours) * 60);

            return `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        function updateAnalogClocks() {
            selectedTimezones.forEach(tz => {
                const now = new Date();
                const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));

                const hourHand = document.getElementById(`hour-${tz}`);
                const minuteHand = document.getElementById(`minute-${tz}`);
                const secondHand = document.getElementById(`second-${tz}`);

                if (hourHand) {
                    hourHand.style.transform = `rotate(${(tzTime.getHours() % 12) * 30 + tzTime.getMinutes() * 0.5}deg)`;
                }
                if (minuteHand) {
                    minuteHand.style.transform = `rotate(${tzTime.getMinutes() * 6 + tzTime.getSeconds() * 0.1}deg)`;
                }
                if (secondHand) {
                    secondHand.style.transform = `rotate(${tzTime.getSeconds() * 6}deg)`;
                }
            });
        }

        function removeTimezone(tz) {
            selectedTimezones = selectedTimezones.filter(t => t !== tz);
            renderPresetButtons();
            updateClocks();
        }

        function updateStats() {
            const count = selectedTimezones.length;
            document.getElementById('statClocks').textContent = count;

            if (count === 0) {
                document.getElementById('statRange').textContent = '-';
                document.getElementById('statEarliest').textContent = '--:--';
                document.getElementById('statLatest').textContent = '--:--';
                return;
            }

            const times = selectedTimezones.map(tz => {
                const now = new Date();
                const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));
                return {
                    tz,
                    time: tzTime,
                    offset: getUtcOffset(tz)
                };
            });

            const offsets = times.map(t => t.offset);
            const minOffset = Math.min(...offsets);
            const maxOffset = Math.max(...offsets);

            document.getElementById('statRange').textContent = `UTC${formatOffset(minOffset)} to UTC${formatOffset(maxOffset)}`;

            const earliest = times.reduce((min, t) => t.time < min.time ? t : min);
            const latest = times.reduce((max, t) => t.time > max.time ? t : max);

            document.getElementById('statEarliest').textContent = formatTime(earliest.time);
            document.getElementById('statLatest').textContent = formatTime(latest.time);
        }

        function getUtcOffset(tz) {
            const now = new Date();
            const utcTime = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz }));
            return (tzTime - utcTime) / (1000 * 60 * 60);
        }

        function formatOffset(offset) {
            const sign = offset >= 0 ? '+' : '-';
            const hours = Math.floor(Math.abs(offset));
            const minutes = Math.round((Math.abs(offset) - hours) * 60);
            return `${sign}${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
        }

        function formatTime(date) {
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // Keyboard support
        document.getElementById('timezoneInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTimezone();
            }
        });
    </script>
</body>
</html>
