<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS BINGO - Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 10px;
            color: #aaa;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: #fff;
        }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #e94560; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .request-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .request-card .user { font-weight: bold; margin-bottom: 4px; }
        .request-card .amount { color: #e94560; font-size: 18px; }
        .request-card .phone { color: #888; font-size: 14px; }
        .request-card .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-approve {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #fff;
        }
        .btn-reject {
            background: linear-gradient(135deg, #ff4757, #cc0033);
            color: #fff;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .settings-form {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 NEXUS BINGO ADMIN</h1>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="showTab('stats')">📊 Stats</button>
            <button class="tab" onclick="showTab('deposits')">💳 Deposits</button>
            <button class="tab" onclick="showTab('withdrawals')">💸 Withdrawals</button>
            <button class="tab" onclick="showTab('settings')">⚙️ Settings</button>
        </div>

        <div id="stats" class="section active">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><div class="value">-</div><div class="label">Users</div></div>
                <div class="stat-card"><div class="value">-</div><div class="label">Games</div></div>
                <div class="stat-card"><div class="value">-</div><div class="label">Active Games</div></div>
                <div class="stat-card"><div class="value">-</div><div class="label">Total Deposits</div></div>
            </div>
        </div>

        <div id="deposits" class="section">
            <div id="deposits-list"><div class="loading">Loading...</div></div>
        </div>

        <div id="withdrawals" class="section">
            <div id="withdrawals-list"><div class="loading">Loading...</div></div>
        </div>

        <div id="settings" class="section">
            <div class="settings-form">
                <div class="input-group">
                    <label>House Cut (%)</label>
                    <input type="number" id="house-cut" min="0" max="50" value="10">
                </div>
                <button class="btn-primary" onclick="saveSettings()">💾 Save</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        tg?.expand();
        tg?.ready();

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Telegram-Init-Data': tg?.initData || ''
            };
        }

        async function apiGet(url) {
            const res = await fetch(url, { headers: getHeaders() });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        async function apiPost(url, body = {}) {
            const res = await fetch(url, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id)?.classList.add('active');
            event.target.classList.add('active');
            if (id === 'stats') loadStats();
            if (id === 'deposits') loadDeposits();
            if (id === 'withdrawals') loadWithdrawals();
            if (id === 'settings') loadSettings();
        }

        async function loadStats() {
            try {
                const data = await apiGet('/api/admin/stats');
                document.getElementById('stats-grid').innerHTML = `
                    <div class="stat-card"><div class="value">${data.users?.total || 0}</div><div class="label">Total Users</div></div>
                    <div class="stat-card"><div class="value">${data.games?.total || 0}</div><div class="label">Total Games</div></div>
                    <div class="stat-card"><div class="value">${data.games?.active || 0}</div><div class="label">Active Games</div></div>
                    <div class="stat-card"><div class="value">${data.financial?.total_deposits?.toFixed(2) || 0}</div><div class="label">Total Deposits</div></div>
                    <div class="stat-card"><div class="value">${data.financial?.total_withdrawals?.toFixed(2) || 0}</div><div class="label">Total Withdrawals</div></div>
                    <div class="stat-card"><div class="value">${data.financial?.pending_deposits || 0}</div><div class="label">Pending Deposits</div></div>
                    <div class="stat-card"><div class="value">${data.financial?.pending_withdrawals || 0}</div><div class="label">Pending Withdrawals</div></div>
                    <div class="stat-card"><div class="value">${data.financial?.house_cut_percent || 10}%</div><div class="label">House Cut</div></div>
                `;
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function loadDeposits() {
            const container = document.getElementById('deposits-list');
            try {
                const deposits = await apiGet('/api/admin/deposits');
                if (!deposits.length) {
                    container.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">No pending deposits</div>';
                    return;
                }
                container.innerHTML = deposits.map(d => `
                    <div class="request-card">
                        <div class="user">${d.first_name || 'User'} (@${d.username || 'unknown'})</div>
                        <div class="amount">${d.amount.toFixed(2)} ETB</div>
                        <div class="phone">ID: ${d.id} | ${new Date(d.created_at).toLocaleString()}</div>
                        <div class="actions">
                            <button class="btn btn-approve" onclick="approveDeposit(${d.id}, true)">✅ Approve</button>
                            <button class="btn btn-reject" onclick="approveDeposit(${d.id}, false)">❌ Reject</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div style="text-align:center;color:#ff4757;padding:40px;">Error: ' + e.message + '</div>';
            }
        }

        async function approveDeposit(id, approved) {
            try {
                await apiPost(`/api/admin/deposits/${id}/approve`, { approved });
                alert(approved ? '✅ Approved!' : '❌ Rejected!');
                loadDeposits();
                loadStats();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function loadWithdrawals() {
            const container = document.getElementById('withdrawals-list');
            try {
                const withdrawals = await apiGet('/api/admin/withdrawals');
                if (!withdrawals.length) {
                    container.innerHTML = '<div style="text-align:center;color:#888;padding:40px;">No pending withdrawals</div>';
                    return;
                }
                container.innerHTML = withdrawals.map(w => `
                    <div class="request-card">
                        <div class="user">${w.first_name || 'User'} (@${w.username || 'unknown'})</div>
                        <div class="amount">${w.amount.toFixed(2)} ETB</div>
                        <div class="phone">Phone: ${w.phone_number || 'N/A'} | ID: ${w.id}</div>
                        <div class="actions">
                            <button class="btn btn-approve" onclick="approveWithdrawal(${w.id}, true)">✅ Approve</button>
                            <button class="btn btn-reject" onclick="approveWithdrawal(${w.id}, false)">❌ Reject</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div style="text-align:center;color:#ff4757;padding:40px;">Error: ' + e.message + '</div>';
            }
        }

        async function approveWithdrawal(id, approved) {
            try {
                await apiPost(`/api/admin/withdrawals/${id}/approve`, { approved });
                alert(approved ? '✅ Approved!' : '❌ Rejected!');
                loadWithdrawals();
                loadStats();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        async function loadSettings() {
            try {
                const settings = await apiGet('/api/admin/settings');
                document.getElementById('house-cut').value = settings.house_cut_percent || 10;
            } catch (e) {
                console.error(e);
            }
        }

        async function saveSettings() {
            const houseCut = parseFloat(document.getElementById('house-cut').value);
            try {
                await apiPost('/api/admin/settings', { house_cut: houseCut });
                alert('✅ Settings saved!');
                loadStats();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        loadStats();
    </script>
</body>
</html>
